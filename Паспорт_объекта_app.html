<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0E2A38">
<title>Паспорт объекта</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --dark:#0E2A38; --teal:#1C7293; --mint:#2A9D8F; --amber:#F4A261; --amberd:#E07A2F;
  --bg:#F2F4F6; --card:#FFFFFF; --ink:#1E2A32; --muted:#6B7B86; --divider:#DDE3E8;
  --danger:#E07A2F; --ok:#2A9D8F;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{font-family:-apple-system,Roboto,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--ink);
  font-size:16px;line-height:1.4;overscroll-behavior-y:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
input,select,textarea{font-family:inherit;font-size:16px;}

/* ===== App bar ===== */
.appbar{position:sticky;top:0;z-index:50;background:var(--dark);color:#fff;
  padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;display:flex;align-items:center;gap:10px;}
.appbar h1{font-size:17px;margin:0;font-weight:700;flex:1;line-height:1.2;}
.appbar .pct{font-size:13px;color:var(--amber);font-weight:700;white-space:nowrap;}
.progress{height:4px;background:#143846;}
.progress > div{height:100%;background:var(--mint);width:0;transition:width .3s;}

/* ===== Screens ===== */
.screen{display:none;padding:16px;padding-bottom:120px;max-width:680px;margin:0 auto;}
.screen.active{display:block;}

/* ===== Home ===== */
.hero{background:var(--dark);border-radius:16px;padding:20px;color:#fff;position:relative;margin-bottom:16px;}
.hero .eyebrow{color:var(--amber);font-size:11px;letter-spacing:2px;font-weight:700;text-transform:uppercase;}
.hero h2{margin:8px 0 4px;font-size:22px;}
.hero p{margin:0;color:#CFE0E8;font-size:13px;}
.bigbtn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
  background:var(--mint);color:#fff;font-weight:700;font-size:17px;padding:18px;border-radius:14px;margin-bottom:12px;}
.bigbtn.secondary{background:#fff;color:var(--teal);border:2px solid var(--teal);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.tile{background:var(--card);border:1px solid var(--divider);border-radius:12px;padding:14px;}
.tile .t{font-weight:700;font-size:14px;}
.tile .n{font-size:28px;font-weight:800;color:var(--mint);margin:2px 0;}
.tile .s{font-size:11px;color:var(--muted);}
.draftitem{background:var(--card);border:1px solid var(--divider);border-radius:10px;padding:12px;
  display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:700;font-size:13px;flex-shrink:0;}

/* ===== Section ===== */
.sectitle{font-size:20px;font-weight:800;margin:4px 0 2px;}
.secsub{color:var(--muted);font-size:13px;margin-bottom:14px;}
.field{background:var(--card);border:1px solid var(--divider);border-radius:12px;padding:14px;margin-bottom:12px;}
.field.invalid{border-color:var(--danger);box-shadow:0 0 0 1px var(--danger);}
.field > label.q{display:block;font-weight:700;font-size:15px;margin-bottom:2px;}
.field .code{color:var(--muted);font-size:11px;font-weight:600;}
.hint{background:#FFF3E0;border-radius:8px;padding:8px 10px;font-size:12px;color:#5a4a30;margin:8px 0;
  display:flex;gap:8px;align-items:flex-start;}
.hint b{color:var(--amberd);}
.req{color:var(--danger);font-weight:700;}

input[type=text],input[type=number],input[type=date],input[type=tel],select,textarea{
  width:100%;padding:12px;border:1.5px solid var(--divider);border-radius:10px;background:#fff;margin-top:8px;}
textarea{min-height:90px;resize:vertical;}
.unit{display:inline-block;margin-left:8px;color:var(--muted);font-weight:700;}

/* choices */
.choices{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.choice{display:flex;align-items:center;gap:12px;padding:12px;border:1.5px solid var(--divider);border-radius:10px;background:#fff;}
.choice.sel{border-color:var(--mint);background:#E8F5F3;}
.choice .box{width:24px;height:24px;border:1.5px solid var(--muted);border-radius:5px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;}
.choice.sel .box{background:var(--mint);border-color:var(--mint);}
.choice .lbl{font-weight:600;}
.choice .sub{font-size:11px;color:var(--muted);}

/* photos */
.photogrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;}
.photocell{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;border:1.5px dashed var(--divider);
  display:flex;align-items:center;justify-content:center;background:#fff;}
.photocell img{width:100%;height:100%;object-fit:cover;}
.photocell .add{font-size:34px;color:var(--divider);}
.photocell .del{position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:50%;
  background:rgba(224,122,47,.92);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:14px;}
.capbtns{display:flex;gap:8px;margin-top:10px;}
.capbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:24px;
  font-weight:700;color:#fff;}
.capbtn.photo{background:var(--mint);} .capbtn.video{background:var(--dark);}

/* signature */
.sigwrap{margin-top:8px;}
.sigpad{width:100%;height:160px;border:1.5px dashed var(--amber);border-radius:10px;background:#fff;touch-action:none;display:block;}
.sigpad.signed{border-style:solid;border-color:var(--mint);}
.sigbtns{display:flex;gap:8px;margin-top:8px;}
.minibtn{padding:8px 14px;border:1.5px solid var(--divider);border-radius:20px;background:#fff;color:var(--muted);font-weight:600;font-size:13px;}

/* voice */
.voicebtn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;margin-top:8px;
  padding:14px;border-radius:24px;background:var(--amber);color:#fff;font-weight:700;}
.voicebtn.rec{background:var(--amberd);animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.gpsbtn{display:inline-flex;align-items:center;gap:8px;margin-top:8px;padding:12px 16px;border-radius:24px;
  background:var(--teal);color:#fff;font-weight:700;font-size:14px;}
.gpsbtn[disabled]{opacity:.6;}
.netbtn{display:inline-flex;align-items:center;gap:8px;margin-top:8px;padding:12px 16px;border-radius:24px;
  background:var(--dark);color:#fff;font-weight:700;font-size:14px;}
.gpsstatus,.voicestatus,.netstatus{font-size:12px;color:var(--muted);margin-top:6px;min-height:15px;line-height:1.3;}
.gpsstatus.err,.voicestatus.err,.netstatus.err{color:var(--amberd);font-weight:600;}

/* ===== Nav ===== */
.navbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--divider);
  padding:10px 16px calc(env(safe-area-inset-bottom) + 10px);display:flex;gap:10px;max-width:680px;margin:0 auto;z-index:40;}
.navbar button{flex:1;padding:14px;border-radius:24px;font-weight:700;font-size:15px;}
.btn-back{background:#fff;border:1.5px solid var(--teal);color:var(--teal);}
.btn-next{background:var(--teal);color:#fff;}
.btn-disabled{background:var(--divider);color:#9CA8B2;}

/* ===== Review / validation ===== */
.banner{border-radius:12px;padding:14px;margin-bottom:14px;display:flex;gap:12px;align-items:flex-start;}
.banner.warn{background:#FFF3E0;} .banner.ok{background:#E8F5F3;}
.banner .ic{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;flex-shrink:0;}
.missitem{background:#fff;border:1px solid var(--divider);border-radius:10px;padding:12px;margin-bottom:8px;
  display:flex;align-items:center;gap:10px;}
.missitem.focus{border-color:var(--danger);background:#FFF5F0;}
.summary{background:#fff;border:1px solid var(--divider);border-radius:12px;padding:14px;margin-bottom:14px;}
.summary .l{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bg);font-size:14px;}
.summary .l span:first-child{color:var(--muted);}
.summary .l span:last-child{font-weight:700;text-align:right;}

.sendmail{background:var(--mint);}
.modal{position:fixed;inset:0;background:rgba(14,42,56,.6);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal.show{display:flex;}
.modalcard{background:#fff;border-radius:16px;padding:20px;max-width:420px;width:100%;}
.modalcard h3{margin:0 0 8px;}

/* ===== Print ===== */
#printRoot{display:none;}
@media print{
  body{background:#fff;}
  .appbar,.progress,.navbar,.screen,.modal{display:none !important;}
  #printRoot{display:block;padding:0;color:#000;font-size:12px;}
  .p-h1{font-size:18px;font-weight:700;text-align:center;margin:0 0 2px;}
  .p-sub{text-align:center;color:#444;font-size:11px;margin-bottom:10px;}
  .p-sec{margin:10px 0 4px;font-weight:700;font-size:13px;border-bottom:1px solid #000;padding-bottom:2px;}
  .p-row{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px dotted #bbb;}
  .p-row .k{color:#333;} .p-row .v{font-weight:600;text-align:right;max-width:60%;}
  .p-photos{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
  .p-photos figure{width:31%;margin:0;font-size:9px;text-align:center;}
  .p-photos img{width:100%;height:auto;border:1px solid #999;}
  .p-signs{display:flex;justify-content:space-between;gap:10px;margin-top:16px;}
  .p-sign{flex:1;text-align:center;}
  .p-sign img{height:50px;}
  .p-sign .line{border-top:1px solid #000;margin-top:4px;padding-top:2px;font-size:10px;}
  .pagebreak{page-break-before:always;}
}
.fabhelp{font-size:13px;color:var(--muted);text-align:center;margin-top:10px;}

/* ===== Вкладки (нижнее меню) ===== */
.tabbar{position:fixed;bottom:0;left:0;right:0;display:flex;background:#fff;border-top:1px solid var(--divider);
  z-index:46;padding-bottom:env(safe-area-inset-bottom);max-width:680px;margin:0 auto;}
.tabbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px 6px;color:var(--muted);font-size:11px;font-weight:600;background:none;}
.tabbtn .ti{font-size:21px;line-height:1;}
.tabbtn.active{color:var(--teal);}
.has-tabs .screen{padding-bottom:96px;}

/* ===== Список (замечания / журнал) ===== */
.listitem{background:#fff;border:1px solid var(--divider);border-radius:12px;padding:14px;margin-bottom:10px;}
.listitem .lt{font-weight:700;font-size:15px;}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;white-space:nowrap;}
.badge.open{background:#FDE3D3;color:#9a4a16;}
.badge.progress{background:#FFF1C9;color:#7a5a00;}
.badge.done{background:#E3F3F0;color:#1C7470;}
.metaline{font-size:12px;color:var(--muted);margin-top:6px;}

/* ===== Чипы (ответственные) ===== */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.chip{display:inline-flex;align-items:center;gap:6px;background:#EAF1F4;color:#1C5566;border-radius:16px;padding:7px 11px;font-size:13px;font-weight:600;}
.chip.sel{background:var(--teal);color:#fff;}
.chip .rb{font-size:10px;opacity:.8;}
.personrow{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--divider);border-radius:10px;padding:10px;margin-bottom:8px;}
.personrow .pn{font-weight:700;}
.rolebadge{font-size:10px;background:var(--teal);color:#fff;border-radius:8px;padding:2px 7px;margin-left:6px;}
.delx{margin-left:auto;color:var(--amberd);font-weight:800;padding:4px 8px;}

/* ===== Инлайн-навигация подэкранов ===== */
.navrow{display:flex;gap:10px;margin-top:16px;}
.navrow button{flex:1;padding:14px;border-radius:24px;font-weight:700;font-size:15px;}
.btn-del{background:#fff;border:1.5px solid var(--amberd);color:var(--amberd);}

/* ===== Блок отправки ===== */
.sendblock{margin-top:14px;border-top:1px solid var(--divider);padding-top:14px;}
.repopt{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--divider);border-radius:10px;margin-bottom:8px;background:#fff;}
.repopt input{width:22px;height:22px;}
.comment{background:#F2F4F6;border-radius:8px;padding:8px 10px;font-size:13px;margin-top:6px;}
.comment .ct{font-size:10px;color:var(--muted);}
</style>
</head>
<body>

<div class="appbar">
  <h1 id="appTitle">Паспорт объекта</h1>
  <div class="pct" id="pct"></div>
</div>
<div class="progress"><div id="progbar"></div></div>

<!-- ===== TAB: ОСМОТР (ЭА) — стартовый экран ===== -->
<div class="screen active" id="screen-home">
  <button class="bigbtn" id="btnNew">➕&nbsp; Новый акт</button>
  <button class="bigbtn secondary" id="btnContinue">▸&nbsp; Продолжить акт</button>
  <div class="row2">
    <div class="tile"><div class="t">Заполнено</div><div class="n" id="homePct">0%</div><div class="s">текущий акт</div></div>
    <div class="tile"><div class="t">Разделов</div><div class="n">13</div><div class="s">по форме V1.3.1</div></div>
  </div>
  <div class="fabhelp">Заполнение, фото и подписи — офлайн. GPS-адрес и голосовой ввод требуют интернета. Данные хранятся только на этом телефоне.</div>
</div>

<!-- act flow -->
<div class="screen" id="screen-section"></div>
<div class="screen" id="screen-review"></div>

<!-- ===== TAB: ЗАМЕЧАНИЯ ===== -->
<div class="screen" id="screen-issues"></div>
<div class="screen" id="screen-issue-edit"></div>

<!-- ===== TAB: ЖУРНАЛ ===== -->
<div class="screen" id="screen-journal"></div>
<div class="screen" id="screen-people"></div>

<!-- act Back/Next -->
<div class="navbar" id="navbar" style="display:none;">
  <button class="btn-back" id="btnBack">‹ Назад</button>
  <button class="btn-next" id="btnNext">Далее ›</button>
</div>

<!-- bottom tabs -->
<div class="tabbar" id="tabbar">
  <button class="tabbtn active" data-tab="act"><span class="ti">📋</span><span>Осмотр</span></button>
  <button class="tabbtn" data-tab="issues"><span class="ti">⚠️</span><span>Замечания</span></button>
  <button class="tabbtn" data-tab="journal"><span class="ti">🗂️</span><span>Журнал</span></button>
</div>

<!-- print container -->
<div id="printRoot"></div>

<script>
"use strict";

/* ============ CONFIG: разделы акта ЭАПО V1.3.1 ============ */
const wallOpts=[["W01","Бетон"],["W02","Кирпич"],["W03","Дерево"],["W04","Металл / сэндвич"],["W05","Иное"]];
const roofOpts=[["R01","Плоская"],["R02","Скатная"],["R03","Вальмовая"],["R04","Ломаная"],["R05","Иное"]];
const coverOpts=[["C01","Профлист"],["C02","Металлочерепица"],["C03","Шифер"],["C04","Мягкая кровля"],["C05","Фальц"],["C06","Иное"]];
const yesno=[["1","Да"],["0","Нет"]];
const foundOpts=[["1","Найден"],["0","Не найден"]];
const markaOpts=[["m1","СИП 2×16"],["m2","СИП 2×25"],["m3","ВВГ 2×1.5"],["m4","ВВГ 3×1.5"],["m5","ВВГ 3×2.5"],["m6","RG213"],["m7","UTP 5e"],["m8","ПуГВ"]];
const protOpts=[["p1","Кабель-канал 40×40"],["p2","Гофра ПВХ 25"],["p3","ПНД 25"],["p4","ПНД 32"],["p5","Открыто"]];
const ptType=[["t1","Опора"],["t2","ЩУ"],["t3","БАО"],["t4","ЗЗ / МЗ"]];

const lineDefs=[
  ["L1","ГРЩ → ЩУ"],["L2","ЩУ → БАО"],["L3","ЩУ → АС"],["L4","БАО → АС/датчик"],
  ["L5","БАО → БМ"],["L6","Резерв / прочее"],["K1","Слаботочка 1"],["K2","Слаботочка 2"]
];
function lineFields(){
  const f=[];
  lineDefs.forEach(([code,name])=>{
    f.push({id:code+"_has",code:code,label:code+" · "+name+" — линия есть?",type:"radio",options:yesno,hint:"Если линии нет — выберите «Нет» и переходите дальше."});
    f.push({id:code+"_marka",code:code+" марка",label:"Марка кабеля",type:"radio",options:markaOpts});
    f.push({id:code+"_prot",code:code+" защита",label:"Способ прокладки / защита",type:"radio",options:protOpts});
    f.push({id:code+"_lc",code:code+"C",label:"Длина кабеля",type:"number",unit:"м",hint:"Длина именно кабеля."});
    f.push({id:code+"_lp",code:code+"P",label:"Длина защиты",type:"number",unit:"м",hint:"Гофра/канал может быть короче кабеля."});
  });
  return f;
}

const SECTIONS=[
 {id:"s1",title:"1. Идентификация",sub:"Коды акта и дата",fields:[
   {id:"id01",code:"ID01",label:"Код акта",type:"text",required:true,hint:"Например: А-2026-0347."},
   {id:"id02",code:"ID02",label:"Код объекта",type:"text",required:true},
   {id:"id03",code:"ID03",label:"Код / ФИО обследователя",type:"text",required:true},
   {id:"d01",code:"D01",label:"Дата осмотра",type:"date",required:true,hint:"Подставлена сегодняшняя дата — при необходимости измените."},
 ]},
 {id:"s2",title:"2. Адрес и контакты",sub:"Где находится объект",fields:[
   {id:"t01",code:"T01",label:"Адрес объекта",type:"text",required:true,gps:"address",hint:"Можно определить по GPS (кнопка ниже) или ввести вручную."},
   {id:"t02",code:"T02",label:"Контактное лицо на объекте",type:"text"},
   {id:"t03",code:"T03",label:"Телефон",type:"tel"},
   {id:"t04",code:"T04",label:"Заказчик",type:"text",required:true},
 ]},
 {id:"s3",title:"3. Координаты точек",sub:"GPS опор и оборудования",fields:[
   {id:"p1_type",code:"P1",label:"Точка 1 — тип",type:"radio",options:ptType},
   {id:"p1_gps",code:"P1 GPS",label:"Координаты точки 1",type:"text",gps:"coords",hint:"Нажмите «Координаты по GPS» — заполнится автоматически."},
   {id:"p2_type",code:"P2",label:"Точка 2 — тип",type:"radio",options:ptType},
   {id:"p2_gps",code:"P2 GPS",label:"Координаты точки 2",type:"text",gps:"coords"},
   {id:"p3_type",code:"P3",label:"Точка 3 — тип",type:"radio",options:ptType},
   {id:"p3_gps",code:"P3 GPS",label:"Координаты точки 3",type:"text",gps:"coords"},
 ]},
 {id:"s4",title:"4. Параметры объекта",sub:"Этажность, стены, кровля",fields:[
   {id:"b01",code:"B01",label:"Этажность",type:"number",required:true,unit:"эт."},
   {id:"w",code:"W01-05",label:"Материал стен",type:"radio",options:wallOpts,required:true,hint:"Если смешанный — выберите основной."},
   {id:"r",code:"R01-05",label:"Тип кровли",type:"radio",options:roofOpts,required:true},
   {id:"c",code:"C01-06",label:"Покрытие кровли",type:"radio",options:coverOpts},
 ]},
 {id:"s5",title:"5. Питание",sub:"ГРЩ / РЩ",fields:[
   {id:"gr01",code:"GR01",label:"ГРЩ / РЩ найден?",type:"radio",options:foundOpts,required:true},
   {id:"gr02",code:"GR02",label:"Нужен монтажный бокс?",type:"radio",options:yesno},
   {id:"gr03",code:"GR03",label:"Доступ к щиту свободный?",type:"radio",options:yesno,hint:"Закрыт на ключ / нужен доступ от заказчика?"},
 ]},
 {id:"s6",title:"6. Размещение оборудования",sub:"Где ставим",fields:[
   {id:"d_as",code:"АС",label:"Место АС / датчиков",type:"text"},
   {id:"e_bao",code:"БАО/БМ",label:"Место БАО / БМ",type:"text"},
   {id:"f_shu",code:"ЩУ",label:"Место ЩУ",type:"text"},
 ]},
 {id:"s7",title:"7. Кабельные линии",sub:"L1–L6, K1–K2",fields:lineFields()},
 {id:"s8",title:"8. Заземление и молниезащита",sub:"ЗЗ / МЗ",fields:[

/* ============ ХРАНИЛИЩЕ ФОТО: IndexedDB ============ */
/* Фото тяжёлые — держим в IndexedDB (лимит сотни МБ), а не в localStorage (~5 МБ).
   В STATE.photos[поле] лежат только id-ссылки. PHOTOCACHE хранит objectURL на время сессии. */
const PHOTOCACHE={};
let _db=null;
function idbOpen(){
  return new Promise((resolve,reject)=>{
    if(_db){resolve(_db);return;}
    if(!("indexedDB" in window)){reject(new Error("no-idb"));return;}
    let req;
    try{req=indexedDB.open("eapo_db",1);}catch(e){reject(e);return;}
    req.onupgradeneeded=()=>{const db=req.result;if(!db.objectStoreNames.contains("photos"))db.createObjectStore("photos");};
    req.onsuccess=()=>{_db=req.result;resolve(_db);};
    req.onerror=()=>reject(req.error||new Error("idb-open"));
  });
}
function idbPut(key,blob){
  return idbOpen().then(db=>new Promise((resolve,reject)=>{
    const tx=db.transaction("photos","readwrite");
    tx.objectStore("photos").put(blob,key);
    tx.oncomplete=()=>resolve();
    tx.onerror=()=>reject(tx.error||new Error("idb-put"));
    tx.onabort=()=>reject(tx.error||new Error("idb-abort"));
  }));
}
function idbGet(key){
  return idbOpen().then(db=>new Promise((resolve,reject)=>{
    const tx=db.transaction("photos","readonly");
    const r=tx.objectStore("photos").get(key);
    r.onsuccess=()=>resolve(r.result||null);
    r.onerror=()=>reject(r.error||new Error("idb-get"));
  }));
}
function idbDel(key){
  return idbOpen().then(db=>new Promise((resolve,reject)=>{
    const tx=db.transaction("photos","readwrite");
    tx.objectStore("photos").delete(key);
    tx.oncomplete=()=>resolve();
    tx.onerror=()=>reject(tx.error||new Error("idb-del"));
  }));
}
function blobToDataURL(blob){
  return new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.onerror=()=>rej(fr.error);fr.readAsDataURL(blob);});
}
function isInlinePhoto(v){return typeof v==="string"&&v.indexOf("data:")===0;}
/* подставляет src в <img data-pid> после рендера */
function hydratePhotos(){
  document.querySelectorAll('img[data-pid]').forEach(im=>{
    const pid=im.getAttribute('data-pid');
    if(!pid)return;
    if(PHOTOCACHE[pid]){im.src=PHOTOCACHE[pid];im.removeAttribute('data-pid');return;}
    idbGet(pid).then(blob=>{
      if(blob){const u=URL.createObjectURL(blob);PHOTOCACHE[pid]=u;im.src=u;im.removeAttribute('data-pid');}
    }).catch(()=>{});
  });
}
/* dataURL фото (из IDB по id, либо если уже inline) — для печати */
function photoDataURL(pid){
  if(isInlinePhoto(pid))return Promise.resolve(pid);
  return idbGet(pid).then(blob=>blob?blobToDataURL(blob):null).catch(()=>null);
}
/* переносит старые inline-фото из localStorage в IndexedDB, чтобы разгрузить квоту */
function migrateInlinePhotos(){
  const tasks=[];
  Object.keys(STATE.photos||{}).forEach(fid=>{
    const arr=STATE.photos[fid]||[];
    arr.forEach((v,i)=>{
      if(isInlinePhoto(v)){
        const t=fetch(v).then(r=>r.blob()).then(blob=>{
          const pid="p_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,7)+"_"+i;
          return idbPut(pid,blob).then(()=>{PHOTOCACHE[pid]=URL.createObjectURL(blob);arr[i]=pid;});
        }).catch(()=>{});
        tasks.push(t);
      }
    });
  });
  return Promise.all(tasks);
}

function isFilled(f){
  if(f.type==="photo")return (STATE.photos[f.id]||[]).length>0;
  if(f.type==="sign")return !!STATE.signs[f.id];
  if(f.type==="checkbox")return (STATE.data[f.id]||[]).length>0;
  const v=STATE.data[f.id];return v!==undefined&&v!==null&&String(v).trim()!=="";
}
function requiredFields(){return allFields().filter(f=>f.required);}
function missingRequired(){return requiredFields().filter(f=>!isFilled(f));}
function completeness(){
  const req=requiredFields();if(!req.length)return 100;
  const done=req.filter(isFilled).length;return Math.round(done/req.length*100);
}
function updateProgress(){
  const p=completeness();

function escapeHtml(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

function renderField(f){
  const reqMark=f.required?` <span class="req">*</span>`:"";
  let inner="";
  const val=STATE.data[f.id];
  if(f.type==="text"||f.type==="tel"){
    inner=`<input type="${f.type==='tel'?'tel':'text'}" data-id="${f.id}" value="${escapeHtml(val)}" placeholder="—">`;
  } else if(f.type==="number"){
    inner=`<input type="number" inputmode="decimal" data-id="${f.id}" value="${escapeHtml(val)}" placeholder="0">${f.unit?`<span class="unit">${f.unit}</span>`:""}`;
  } else if(f.type==="date"){
    inner=`<input type="date" data-id="${f.id}" value="${escapeHtml(val)}">`;
  } else if(f.type==="textarea"){
    inner=`<textarea data-id="${f.id}" placeholder="—">${escapeHtml(val)}</textarea>`;
    if(f.voice)inner+=`<button class="voicebtn" data-voice="${f.id}">🎤 Надиктовать голосом</button><div class="voicestatus" id="vstat-${f.id}"></div>`;
  } else if(f.type==="radio"){
    inner=`<div class="choices" data-radio="${f.id}">`+f.options.map(([k,lbl])=>{
      const sel=val===k?"sel":"";
      return `<div class="choice ${sel}" data-k="${k}"><div class="box">${sel?"✓":""}</div><div><div class="lbl">${lbl}</div><div class="sub">${f.code} · ${k}</div></div></div>`;
    }).join("")+`</div>`;
  } else if(f.type==="checkbox"){
    const arr=STATE.data[f.id]||[];
    inner=`<div class="choices" data-check="${f.id}">`+f.options.map(([k,lbl])=>{
      const sel=arr.includes(k)?"sel":"";
      return `<div class="choice ${sel}" data-k="${k}"><div class="box">${sel?"✓":""}</div><div class="lbl">${lbl}</div></div>`;
    }).join("")+`</div>`;
  } else if(f.type==="photo"){
    inner=renderPhotos(f);
  } else if(f.type==="sign"){
    inner=renderSign(f);
  }
  if(f.gps){
    inner+=`<button class="gpsbtn" data-gps="${f.id}">📍 ${f.gps==='address'?'Определить адрес по GPS':'Координаты по GPS'}</button><div class="gpsstatus" id="gps-${f.id}"></div>`;
  }
  if(f.net){
    inner+=`<button class="netbtn" data-net="${f.id}">📶 Тип связи сейчас</button><div class="netstatus" id="net-${f.id}"></div>`;
  }
  const hint=f.hint?`<div class="hint"><b>?</b><span>${f.hint}</span></div>`:"";
  return `<div class="field" id="field-${f.id}">
    <label class="q">${f.label}${reqMark}</label><span class="code">${f.code}</span>
    ${hint}${inner}</div>`;
}

function renderPhotos(f){
  const arr=STATE.photos[f.id]||[];
  let cells=arr.map((pid,idx)=>{
    let attr;
    if(isInlinePhoto(pid))attr=`src="${pid}"`;
    else if(PHOTOCACHE[pid])attr=`src="${PHOTOCACHE[pid]}"`;
    else attr=`data-pid="${pid}"`;
    return `<div class="photocell"><img ${attr}><div class="del" data-delphoto="${f.id}" data-idx="${idx}">✕</div></div>`;
  }).join("");
  cells+=`<label class="photocell"><span class="add">+</span><input type="file" accept="image/*" capture="environment" data-photo="${f.id}" style="display:none"></label>`;
  let cap=`<div class="photogrid">${cells}</div>`;
  cap+=`<div class="capbtns">
    <label class="capbtn photo">📷 Фото<input type="file" accept="image/*" capture="environment" data-photo="${f.id}" style="display:none"></label>
    <label class="capbtn video">🎬 Видео<input type="file" accept="video/*" capture="environment" data-video="${f.id}" style="display:none"></label>
  </div>`;
  const vids=(STATE.data["__vid_"+f.id]||[]);

  return cap;
}

/* ============ BIND ============ */
function bindField(f){
  const el=document.querySelector(`[data-id="${f.id}"]`);
  if(el){el.addEventListener("input",()=>{STATE.data[f.id]=el.value;save();updateProgress();markValid(f);});}
  // radio
  const rg=document.querySelector(`[data-radio="${f.id}"]`);
  if(rg){rg.querySelectorAll(".choice").forEach(ch=>ch.addEventListener("click",()=>{
    const k=ch.getAttribute("data-k");
    STATE.data[f.id]=(STATE.data[f.id]===k)?undefined:k;save();renderSection({keepScroll:true});
  }));}
  // checkbox
  const cg=document.querySelector(`[data-check="${f.id}"]`);
  if(cg){cg.querySelectorAll(".choice").forEach(ch=>ch.addEventListener("click",()=>{
    const k=ch.getAttribute("data-k");let arr=STATE.data[f.id]||[];
    if(arr.includes(k))arr=arr.filter(x=>x!==k);else arr=[...arr,k];
    STATE.data[f.id]=arr;save();renderSection({keepScroll:true});
  }));}
  // voice
  const vb=document.querySelector(`[data-voice="${f.id}"]`);
  if(vb)vb.addEventListener("click",()=>startVoice(f.id,vb));
  // gps
  const gb=document.querySelector(`[data-gps="${f.id}"]`);
  if(gb)gb.addEventListener("click",()=>handleGpsField(f,gb));
  // net
  const nb=document.querySelector(`[data-net="${f.id}"]`);
  if(nb)nb.addEventListener("click",()=>handleNetField(f,nb));
  // photos
  document.querySelectorAll(`[data-photo="${f.id}"]`).forEach(inp=>inp.addEventListener("change",e=>handlePhoto(e,f.id)));
  document.querySelectorAll(`[data-video="${f.id}"]`).forEach(inp=>inp.addEventListener("change",e=>handleVideo(e,f.id)));
  document.querySelectorAll(`[data-delphoto="${f.id}"]`).forEach(b=>b.addEventListener("click",()=>{
    const idx=+b.getAttribute("data-idx");
    const arr=STATE.photos[f.id]||[];
    const pid=arr[idx];
    arr.splice(idx,1);
    if(pid&&!isInlinePhoto(pid)){
      if(PHOTOCACHE[pid]){URL.revokeObjectURL(PHOTOCACHE[pid]);delete PHOTOCACHE[pid];}
      idbDel(pid).catch(()=>{});
    }
    save();renderSection({keepScroll:true});
  }));
  // sign
  const canvas=document.querySelector(`[data-sign="${f.id}"]`);
  if(canvas)initSignPad(canvas,f.id);
  const cs=document.querySelector(`[data-clearsign="${f.id}"]`);
  if(cs)cs.addEventListener("click",()=>{delete STATE.signs[f.id];save();renderSection({keepScroll:true});});
  const ps=document.querySelector(`[data-papersign="${f.id}"]`);
  if(ps)ps.addEventListener("click",()=>{STATE.signs[f.id]="PAPER";save();renderSection({keepScroll:true});});
}
function markValid(f){const fl=document.getElementById("field-"+f.id);if(fl&&isFilled(f))fl.classList.remove("invalid");}

/* ============ PHOTO ============ */
/* универсальная обработка снимка: сжать → Blob в IndexedDB → done(ref);
   ref = pid (IndexedDB) или dataURL (фолбэк). done(null) при ошибке. */
function processPhotoFile(file,done){
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const max=1280;let w=img.width,h=img.height;
      if(w>max){h=Math.round(h*max/w);w=max;}
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      const inline=()=>{try{done(c.toDataURL("image/jpeg",0.6));}catch(err){alert("Не удалось сохранить фото: память телефона заполнена.");done(null);}};
      if(!("indexedDB" in window)||!c.toBlob){inline();return;}
      c.toBlob(blob=>{
        if(!blob){inline();return;}
        const pid="p_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,7);
        idbPut(pid,blob).then(()=>{PHOTOCACHE[pid]=URL.createObjectURL(blob);done(pid);}).catch(()=>inline());
      },"image/jpeg",0.6);
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}
function handlePhoto(e,id){
  const file=e.target.files[0];if(!file){return;}
  processPhotoFile(file,ref=>{
    if(ref){if(!STATE.photos[id])STATE.photos[id]=[];STATE.photos[id].push(ref);try{save();}catch(err){}}
    renderSection({keepScroll:true});
  });
  e.target.value="";
}
function handleVideo(e,id){
  const file=e.target.files[0];if(!file)return;
  const key="__vid_"+id;if(!STATE.data[key])STATE.data[key]=[];
  STATE.data[key].push({name:file.name||"video.mp4",size:file.size});
  save();renderSection({keepScroll:true});
  alert("Видео записано. Большие видео не хранятся внутри приложения — приложите файл к письму вручную.");
  e.target.value="";
}

/* ============ SIGNATURE ============ */
function initSignPad(canvas,id){
  const ctx=canvas.getContext("2d");
  ctx.lineWidth=3;ctx.lineCap="round";ctx.strokeStyle="#0E2A38";
  // restore
  const saved=STATE.signs[id];
  if(saved&&saved!=="PAPER"){const im=new Image();im.onload=()=>ctx.drawImage(im,0,0,canvas.width,canvas.height);im.src=saved;}
  if(saved==="PAPER"){ctx.fillStyle="#6B7B86";ctx.font="20px sans-serif";ctx.textAlign="center";ctx.fillText("Подписи в бумаге",canvas.width/2,canvas.height/2);}
  let drawing=false,dirty=false;
  function pos(e){const r=canvas.getBoundingClientRect();const t=e.touches?e.touches[0]:e;
    return {x:(t.clientX-r.left)*canvas.width/r.width,y:(t.clientY-r.top)*canvas.height/r.height};}
  function start(e){if(saved==="PAPER")return;e.preventDefault();drawing=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);}
  function move(e){if(!drawing)return;e.preventDefault();const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();dirty=true;}
  function end(){if(!drawing)return;drawing=false;if(dirty){STATE.signs[id]=canvas.toDataURL("image/png");save();canvas.classList.add("signed");updateProgress();}}
  canvas.addEventListener("pointerdown",start);canvas.addEventListener("pointermove",move);
  canvas.addEventListener("pointerup",end);canvas.addEventListener("pointerleave",end);
  canvas.addEventListener("touchstart",start,{passive:false});canvas.addEventListener("touchmove",move,{passive:false});
  canvas.addEventListener("touchend",end);
}

/* ============ VOICE (надиктовка → текст) ============ */
let recog=null;
function setVStat(statusId,m,err){const el=document.getElementById(statusId);if(el){el.textContent=m;el.classList.toggle('err',!!err);}}
/* универсальный движок: getText/setText — геттер/сеттер целевого текста */
function runVoice(btn,statusId,getText,setText){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){setVStat(statusId,"Голосовой ввод не поддерживается этим браузером. Откройте приложение в Google Chrome.",true);return;}
  if(recog){try{recog.stop();}catch(e){}return;}
  let base=(getText()||"");
  recog=new SR();
  recog.lang="ru-RU";recog.continuous=true;recog.interimResults=true;recog.maxAlternatives=1;
  btn.classList.add("rec");btn.textContent="⏺ Идёт запись… (нажмите, чтобы остановить)";
  setVStat(statusId,"Говорите… (нужен интернет)",false);
  recog.onresult=ev=>{
    let fin="",interim="";
    for(let i=ev.resultIndex;i<ev.results.length;i++){
      const r=ev.results[i];
      if(r.isFinal)fin+=r[0].transcript;else interim+=r[0].transcript;
    }
    if(fin){base=(base+" "+fin).replace(/\s+/g,' ').trim();setText(base,false);save();}
    setText(base+(interim?" "+interim:""),true);
    setVStat(statusId, interim?("…"+interim):"Записано. Можно продолжать или нажать «стоп».", false);
  };
  recog.onerror=ev=>{
    const e=ev.error;let m="Ошибка распознавания: "+e;
    if(e==='not-allowed'||e==='service-not-allowed')
      m="Нет доступа к микрофону. "+(location.protocol==='file:'
        ?"Откройте приложение по http://localhost или https:// (не как файл) и разрешите микрофон."
        :"Разрешите доступ к микрофону в настройках браузера.");
    else if(e==='no-speech')m="Не услышал речь — попробуйте ещё раз, ближе к телефону.";
    else if(e==='audio-capture')m="Микрофон не найден на устройстве.";
    else if(e==='network')m="Нет интернета. Перевод речи в текст работает только при подключении к сети.";
    else if(e==='aborted')m="Запись остановлена.";
    setVStat(statusId,m,(e!=='aborted'&&e!=='no-speech'));
  };
  recog.onend=()=>{btn.classList.remove("rec");btn.textContent="🎤 Надиктовать голосом";recog=null;};
  try{recog.start();}
  catch(err){setVStat(statusId,"Не удалось запустить запись: "+err.message,true);btn.classList.remove("rec");btn.textContent="🎤 Надиктовать голосом";recog=null;}
}

/* ============ GPS (геолокация + адрес) ============ */
function insecureHint(){
  return location.protocol==='file:'
    ? "Откройте приложение не как файл, а по адресу http://localhost или https:// — иначе телефон не даёт доступ к GPS."
    : "Разрешите доступ к геолокации и убедитесь, что страница открыта по https.";
}
function getGPS(){
  return new Promise((resolve,reject)=>{
    if(!('geolocation' in navigator)){reject({code:0,message:'no-geo'});return;}
    navigator.geolocation.getCurrentPosition(
      p=>resolve(p.coords),
      err=>reject(err),
      {enableHighAccuracy:true,timeout:20000,maximumAge:5000}
    );
  });
}
async function geocodeYandex(lat,lon,key){
  const url="https://geocode-maps.yandex.ru/1.x/?apikey="+encodeURIComponent(key)+"&format=json&lang=ru_RU&results=1&kind=house&geocode="+lon+","+lat;
  const res=await fetch(url);
  if(!res.ok)throw new Error("yandex http "+res.status);
  const j=await res.json();
  const fm=j&&j.response&&j.response.GeoObjectCollection&&j.response.GeoObjectCollection.featureMember;
  if(!fm||!fm.length)throw new Error("yandex empty");
  const meta=((((fm[0].GeoObject||{}).metaDataProperty||{}).GeocoderMetaData)||{});
  const arr=(meta.Address&&meta.Address.Components)||[];
  const get=k=>{const c=arr.find(x=>x.kind===k);return c?c.name:"";};
  const settlement=get("locality")||get("area")||get("province")||"";
  return {settlement,road:get("street"),house:get("house"),display:meta.text||"",source:"Яндекс"};
}
async function geocodeOSM(lat,lon){
  const url="https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat="+lat+"&lon="+lon+"&accept-language=ru&zoom=14&addressdetails=1";
  const res=await fetch(url,{headers:{'Accept':'application/json'}});
  if(!res.ok)throw new Error("osm http "+res.status);
  const j=await res.json();const a=j.address||{};
  const settlement=a.city||a.town||a.village||a.hamlet||a.municipality||a.suburb||a.county||a.state||"";
  return {settlement,road:a.road||"",house:a.house_number||"",display:j.display_name||"",source:"OSM"};
}
async function reverseGeocode(lat,lon){
  const key=yandexKey();
  if(key){
    try{ return await geocodeYandex(lat,lon,key); }
    catch(e){ /* ключа нет/ошибка/CORS — пробуем запасной источник */ }
  }
  return await geocodeOSM(lat,lon);
}

/* ============ ТИП СВЯЗИ (Network Information API) ============ */
function handleNetField(f,btn){
  const setN=(msg,err)=>{const el=document.getElementById('net-'+f.id);if(el){el.textContent=msg;el.classList.toggle('err',!!err);}};
  const c=navigator.connection||navigator.mozConnection||navigator.webkitConnection;
  if(!c||(!c.effectiveType&&!c.type)){
    setN("Этот браузер не сообщает тип связи. Откройте приложение в Google Chrome.",true);
    return;
  }
  const cat={"slow-2g":"2G (медленно)","2g":"2G","3g":"3G","4g":"4G/LTE"};
  let val=cat[c.effectiveType]||c.effectiveType||"—";
  const t=c.type;
  if(t&&t!=="cellular"&&t!=="unknown"){
    const tn={wifi:"Wi-Fi",ethernet:"проводное",wimax:"WiMAX",bluetooth:"Bluetooth",none:"нет сети"}[t]||t;
    val+=" ("+tn+")";
  }
  const extra=[];
  if(typeof c.downlink==="number"&&c.downlink>0)extra.push("≈"+c.downlink+" Мбит/с");
  if(typeof c.rtt==="number"&&c.rtt>0)extra.push("пинг "+c.rtt+" мс");
  STATE.data[f.id]=val+(extra.length?" · "+extra.join(", "):"");
  save();
  const inp=document.querySelector(`[data-id="${f.id}"]`);if(inp)inp.value=STATE.data[f.id];
  updateProgress();
  if(!navigator.onLine)setN("Сейчас офлайн — категория может быть неточной.",true);
  else setN("Подставлено. Это ориентир по скорости, не уровень сигнала и не оператор.",false);
}
function setGps(id,msg,err){const el=document.getElementById('gps-'+id);if(el){el.textContent=msg;el.classList.toggle('err',!!err);}}
function gpsErr(e){
  if(e&&e.code===1)return "Нет доступа к GPS. "+insecureHint();
  if(e&&e.code===2)return "Местоположение недоступно. Включите GPS и попробуйте на открытом месте.";
  if(e&&e.code===3)return "GPS долго не отвечает. Попробуйте на улице под открытым небом.";
  if(e&&e.message==='no-geo')return "Браузер не поддерживает геолокацию.";
  return "Ошибка GPS: "+((e&&e.message)||e);
}
async function handleGpsField(f,btn){
  const oldTxt=btn.textContent;btn.textContent='⏳ Определяю…';btn.disabled=true;
  setGps(f.id,"Определяю местоположение…",false);
  try{
    const c=await getGPS();
    const coordStr=c.latitude.toFixed(6)+", "+c.longitude.toFixed(6);
    if(f.gps==='coords'){
      STATE.data[f.id]=coordStr;save();
      const inp=document.querySelector(`[data-id="${f.id}"]`);if(inp)inp.value=coordStr;
      setGps(f.id,"Готово · точность ±"+Math.round(c.accuracy)+" м",false);
    } else {
      askYandexKey();
      setGps(f.id,"Координаты получены, определяю населённый пункт…",false);
      try{
        const g=await reverseGeocode(c.latitude,c.longitude);
        let addr=g.settlement||"";
        if(g.road)addr+=(addr?", ":"")+g.road;
        if(g.house)addr+=" "+g.house;
        if(!addr)addr=coordStr;
        STATE.data[f.id]=addr;save();
        const inp=document.querySelector(`[data-id="${f.id}"]`);if(inp)inp.value=addr;
        setGps(f.id, g.settlement?("Определено ("+(g.source||"")+"): "+g.settlement):("Без названия — координаты "+coordStr), false);
      }catch(ge){
        STATE.data[f.id]=coordStr;save();
        const inp=document.querySelector(`[data-id="${f.id}"]`);if(inp)inp.value=coordStr;
        setGps(f.id,"Нет сети для названия — вставлены координаты "+coordStr,true);
      }
    }
    updateProgress();
  }catch(e){
    setGps(f.id,gpsErr(e),true);
  }finally{
    btn.textContent=oldTxt;btn.disabled=false;
  }
}

async function buildPrint(){
  const d=STATE.data;
  function lbl(f,val){
    if(f.type==="radio"){const o=(f.options||[]).find(x=>x[0]===val);return o?o[1]:"—";}
    if(f.type==="checkbox"){const arr=val||[];return arr.map(k=>{const o=f.options.find(x=>x[0]===k);return o?o[1]:k;}).join(", ")||"—";}
    return (val===undefined||val===null||val==="")?"—":val;
  }
  let h=`<div class="p-h1">АКТ ПРЕДПРОЕКТНОГО ОСМОТРА</div>
    <div class="p-sub">ЭА · V1.3.1 · ${escapeHtml(d.id01||"")} · ${escapeHtml(d.d01||"")}</div>`;
  for(const sec of SECTIONS){
    if(sec.id==="s13")continue; // подписи отдельно
    const rows=sec.fields.filter(f=>f.type!=="photo"&&f.type!=="sign").map(f=>{
      return `<div class="p-row"><span class="k">${escapeHtml(f.label)} <small>(${f.code})</small></span><span class="v">${escapeHtml(lbl(f,STATE.data[f.id]))}</span></div>`;
    }).join("");
    if(rows)h+=`<div class="p-sec">${sec.title}</div>${rows}`;
    const photos=sec.fields.filter(f=>f.type==="photo");
    for(const f of photos){
      const arr=STATE.photos[f.id]||[];
      if(!arr.length)continue;
      let figs="";
      for(const pid of arr){
        const du=await photoDataURL(pid);
        if(du)figs+=`<figure><img src="${du}"><figcaption>${f.code}</figcaption></figure>`;
      }
      if(figs)h+=`<div class="p-photos">${figs}</div>`;
    }
  }
  // signatures
  h+=`<div class="p-sec pagebreak">Подписи сторон</div><div class="p-signs">`;
  [["s01","Исполнитель"],["s02","Заказчик"],["s03","Собственник"]].forEach(([k,role])=>{
    const fio=d[k+"_fio"]||"";const sig=STATE.signs[k+"_sign"];
    let img="";
    if(sig&&sig!=="PAPER")img=`<img src="${sig}">`;
    else if(sig==="PAPER")img=`<div style="height:50px;line-height:50px;color:#666;font-size:10px">(подпись в бумаге)</div>`;
    else img=`<div style="height:50px"></div>`;
    h+=`<div class="p-sign">${img}<div class="line">${escapeHtml(role)}<br><b>${escapeHtml(fio||"—")}</b></div></div>`;
  });
  h+=`</div>`;
  return h;
}

}

    h+=`<div class="sendblock">
      <div style="font-weight:700;margin-bottom:6px">Отправить список замечаний</div>
      <div class="field"><label class="q">Почта для отправки</label>
        <input type="email" id="iss-email" value="${escapeHtml(STATE.userEmail||"")}" placeholder="введите почту для отправки">
        <div class="hint"><b>i</b><span>Уйдёт на ${EMAIL_TO} и на введённую почту. Фото — в PDF (печать).</span></div></div>
      <button class="bigbtn" style="background:var(--teal)" id="iss-print">🖨 Печать / PDF</button>
      <button class="bigbtn sendmail" id="iss-send">✉ Отправить замечания</button></div>`;
  }
  root.innerHTML=h;
  $("#btnAddIssue").addEventListener("click",()=>{
    const it={id:uid("iss"),title:"",text:"",photos:[],status:"open",created:Date.now()};
    STATE.issues.push(it);save();openIssue(it.id);
  });
  root.querySelectorAll("[data-openissue]").forEach(el=>el.addEventListener("click",()=>openIssue(el.getAttribute("data-openissue"))));
  const em=root.querySelector("#iss-email");if(em)em.addEventListener("input",e=>{STATE.userEmail=e.target.value.trim();save();});
  const ip=root.querySelector("#iss-print");if(ip)ip.addEventListener("click",()=>doPrintReport({issues:true}));
  const is=root.querySelector("#iss-send");if(is)is.addEventListener("click",()=>doEmailReport({issues:true}));
  hydratePhotos();window.scrollTo(0,0);
}
function openIssue(id){renderIssueEdit(id);}
function renderIssueEdit(id){
  const it=STATE.issues.find(x=>x.id===id);if(!it){showTab('issues');return;}
  hideAllScreens();
  $("#appTitle").textContent="Замечание";
  $("#tabbar").style.display="none";$("#navbar").style.display="none";
  const root=$("#screen-issue-edit");root.classList.add("active");
  let h=`<div class="sectitle">Замечание</div><div class="secsub">Опишите проблему, добавьте фото и голос</div>`;
  h+=`<div class="field"><label class="q">Заголовок</label>
    <input type="text" id="iss-title" value="${escapeHtml(it.title)}" placeholder="Кратко, напр. «Трещина в опоре»"></div>`;
  h+=`<div class="field"><label class="q">Описание</label>
    <textarea id="iss-text" placeholder="Что не так, где, что сделать">${escapeHtml(it.text)}</textarea>
    <button class="voicebtn" id="iss-voicebtn">🎤 Надиктовать голосом</button><div class="voicestatus" id="ivstat"></div></div>`;
  h+=`<div class="field"><label class="q">Статус</label><div class="choices" id="iss-status">`+
    STATUS.map(([k,l])=>`<div class="choice ${it.status===k?'sel':''}" data-s="${k}"><div class="box">${it.status===k?'✓':''}</div><div class="lbl">${l}</div></div>`).join("")+`</div></div>`;
  h+=`<div class="field"><label class="q">Фото</label>${renderIssuePhotos(it)}</div>`;
  h+=`<div class="navrow"><button class="btn-back" id="iss-back">‹ К замечаниям</button><button class="btn-del" id="iss-delete">Удалить</button></div>`;
  root.innerHTML=h;
  $("#iss-title").addEventListener("input",e=>{it.title=e.target.value;save();});
  $("#iss-text").addEventListener("input",e=>{it.text=e.target.value;save();});
  $("#iss-voicebtn").addEventListener("click",()=>runVoice($("#iss-voicebtn"),"ivstat",
    ()=>it.text,(v)=>{it.text=v;const ta=$("#iss-text");if(ta)ta.value=v;}));
  $("#iss-status").querySelectorAll(".choice").forEach(ch=>ch.addEventListener("click",()=>{it.status=ch.getAttribute("data-s");save();renderIssueEdit(id);}));
  root.querySelectorAll('[data-issphoto]').forEach(inp=>inp.addEventListener("change",e=>{
    const f=e.target.files[0];if(f)processPhotoFile(f,ref=>{if(ref)it.photos.push(ref);save();renderIssueEdit(id);});e.target.value="";
  }));
  root.querySelectorAll('[data-issdel]').forEach(b=>b.addEventListener("click",()=>{
    const i=+b.getAttribute("data-issdel");const pid=it.photos[i];it.photos.splice(i,1);
    if(pid&&!isInlinePhoto(pid)){if(PHOTOCACHE[pid]){URL.revokeObjectURL(PHOTOCACHE[pid]);delete PHOTOCACHE[pid];}idbDel(pid).catch(()=>{});}
    save();renderIssueEdit(id);
  }));
  $("#iss-back").addEventListener("click",()=>showTab('issues'));
  $("#iss-delete").addEventListener("click",()=>{
    if(!confirm("Удалить это замечание?"))return;
    (it.photos||[]).forEach(pid=>{if(!isInlinePhoto(pid)){if(PHOTOCACHE[pid]){URL.revokeObjectURL(PHOTOCACHE[pid]);delete PHOTOCACHE[pid];}idbDel(pid).catch(()=>{});}});
    STATE.issues=STATE.issues.filter(x=>x.id!==id);save();showTab('issues');
  });
  hydratePhotos();window.scrollTo(0,0);
}
function renderIssuePhotos(it){
  const arr=it.photos||[];
  let cells=arr.map((pid,idx)=>{
    let attr=isInlinePhoto(pid)?`src="${pid}"`:(PHOTOCACHE[pid]?`src="${PHOTOCACHE[pid]}"`:`data-pid="${pid}"`);
    return `<div class="photocell"><img ${attr}><div class="del" data-issdel="${idx}">✕</div></div>`;
  }).join("");
  cells+=`<label class="photocell"><span class="add">+</span><input type="file" accept="image/*" capture="environment" data-issphoto="1" style="display:none"></label>`;
  let cap=`<div class="photogrid">${cells}</div>`;
  cap+=`<div class="capbtns"><label class="capbtn photo">📷 Фото<input type="file" accept="image/*" capture="environment" data-issphoto="1" style="display:none"></label></div>`;
  return cap;
}

/* ===================== ЖУРНАЛ + ОТВЕТСТВЕННЫЕ ===================== */
function renderJournal(){
  hideAllScreens();
  $("#appTitle").textContent="Журнал объекта";
  $("#tabbar").style.display="flex";$("#navbar").style.display="none";setActiveTabBtn("journal");
  const root=$("#screen-journal");root.classList.add("active");
  const j=STATE.journal;
  let h=`<div class="sectitle">Журнал объекта</div><div class="secsub">Записи, ответственные, статусы (локально на этом телефоне)</div>`;
  // ответственные
  h+=`<div class="field"><div style="display:flex;justify-content:space-between;align-items:center"><label class="q" style="margin:0">Ответственные за объект</label><button class="minibtn" id="btnPeople">Изменить</button></div>`;
  if(!j.people.length)h+=`<div style="font-size:13px;color:var(--muted);margin-top:8px">Не назначены. Нажмите «Изменить».</div>`;
  else{h+=`<div class="chips">`+j.people.map(p=>`<span class="chip">${escapeHtml(p.name)}<span class="rb">${escapeHtml(p.role||"")}</span></span>`).join("")+`</div>`;}
  h+=`</div>`;
  // новая запись
  h+=`<button class="bigbtn" id="btnAddRec">➕ Новая запись</button>`;
  // список записей
  if(!j.records.length)h+=`<div class="fabhelp">Записей пока нет.</div>`;
  j.records.forEach((r,idx)=>{
    const resp=(r.responsibleIds||[]).map(id=>{const p=j.people.find(x=>x.id===id);return p?p.name:"";}).filter(Boolean).join(", ");
    h+=`<div class="listitem">
      <div style="display:flex;justify-content:space-between;gap:8px;align-items:center">
        <div class="lt">Запись ${idx+1}</div><span class="badge ${r.status||'open'}">${statusLabel(r.status)}</span></div>
      <div style="font-size:14px;margin-top:4px">${escapeHtml(r.text||"—")}</div>
      <div class="metaline">${resp?("👤 "+escapeHtml(resp)):"👤 —"}${r.due?(" · 🗓 "+escapeHtml(r.due)):""}</div>`;
    (r.comments||[]).forEach(c=>{h+=`<div class="comment">${escapeHtml(c.text)}<div class="ct">${c.ts?new Date(c.ts).toLocaleString('ru-RU'):""}</div></div>`;});
    h+=`<div style="display:flex;gap:8px;margin-top:8px">
      <input type="text" data-cmt="${r.id}" placeholder="Комментарий…" style="flex:1;margin:0;padding:8px">
      <button class="minibtn" data-addcmt="${r.id}">+</button>
      <button class="minibtn" data-cyc="${r.id}">Статус</button>
      <button class="minibtn" data-delrec="${r.id}" style="color:var(--amberd)">✕</button></div>`;
    h+=`</div>`;
  });
  root.innerHTML=h;
  $("#btnPeople").addEventListener("click",()=>renderPeople());
  $("#btnAddRec").addEventListener("click",()=>renderRecordEdit(null));
  root.querySelectorAll("[data-addcmt]").forEach(b=>b.addEventListener("click",()=>{
    const id=b.getAttribute("data-addcmt");const inp=root.querySelector(`[data-cmt="${id}"]`);
    const v=(inp.value||"").trim();if(!v)return;const r=j.records.find(x=>x.id===id);
    if(!r.comments)r.comments=[];r.comments.push({text:v,ts:Date.now()});save();renderJournal();
  }));
  root.querySelectorAll("[data-cyc]").forEach(b=>b.addEventListener("click",()=>{
    const r=j.records.find(x=>x.id===b.getAttribute("data-cyc"));
    const order=["open","progress","done"];r.status=order[(order.indexOf(r.status||"open")+1)%order.length];save();renderJournal();
  }));
  root.querySelectorAll("[data-delrec]").forEach(b=>b.addEventListener("click",()=>{
    if(!confirm("Удалить запись?"))return;
    STATE.journal.records=j.records.filter(x=>x.id!==b.getAttribute("data-delrec"));save();renderJournal();
  }));
  window.scrollTo(0,0);
}
function renderRecordEdit(recId){
  const j=STATE.journal;
  let r=recId?j.records.find(x=>x.id===recId):null;
  const isNew=!r;
  if(isNew)r={id:uid("rec"),text:"",responsibleIds:[],due:"",status:"open",comments:[],created:Date.now()};
  hideAllScreens();
  $("#appTitle").textContent=isNew?"Новая запись":"Запись";
  $("#tabbar").style.display="none";$("#navbar").style.display="none";
  const root=$("#screen-people");root.classList.add("active");
  let h=`<div class="sectitle">${isNew?"Новая запись":"Запись"}</div><div class="secsub">Что сделать, кто ответственный, срок</div>`;
  h+=`<div class="field"><label class="q">Текст записи</label>
    <textarea id="rec-text" placeholder="Например: устранить замечание по опоре">${escapeHtml(r.text)}</textarea>
    <button class="voicebtn" id="rec-voicebtn">🎤 Надиктовать голосом</button><div class="voicestatus" id="rvstat"></div></div>`;
  h+=`<div class="field"><label class="q">Ответственный(е)</label>`;
  if(!j.people.length)h+=`<div style="font-size:13px;color:var(--muted)">Сначала добавьте ответственных (вкладка Журнал → «Изменить»).</div>`;
  else h+=`<div class="chips" id="rec-people">`+j.people.map(p=>`<span class="chip ${r.responsibleIds.includes(p.id)?'sel':''}" data-pid="${p.id}">${escapeHtml(p.name)}<span class="rb">${escapeHtml(p.role||"")}</span></span>`).join("")+`</div>`;
  h+=`</div>`;
  h+=`<div class="field"><label class="q">Срок</label><input type="date" id="rec-due" value="${escapeHtml(r.due||"")}"></div>`;
  h+=`<div class="field"><label class="q">Статус</label><div class="choices" id="rec-status">`+
    STATUS.map(([k,l])=>`<div class="choice ${r.status===k?'sel':''}" data-s="${k}"><div class="box">${r.status===k?'✓':''}</div><div class="lbl">${l}</div></div>`).join("")+`</div></div>`;
  h+=`<div class="navrow"><button class="btn-back" id="rec-back">‹ Отмена</button><button class="btn-next" id="rec-save">Сохранить</button></div>`;
  root.innerHTML=h;
  $("#rec-text").addEventListener("input",e=>{r.text=e.target.value;});
  $("#rec-voicebtn").addEventListener("click",()=>runVoice($("#rec-voicebtn"),"rvstat",
    ()=>r.text,(v)=>{r.text=v;const ta=$("#rec-text");if(ta)ta.value=v;}));
  const rp=root.querySelector("#rec-people");
  if(rp)rp.querySelectorAll(".chip").forEach(ch=>ch.addEventListener("click",()=>{
    const pid=ch.getAttribute("data-pid");
    if(r.responsibleIds.includes(pid))r.responsibleIds=r.responsibleIds.filter(x=>x!==pid);else r.responsibleIds.push(pid);
    ch.classList.toggle("sel");
  }));
  $("#rec-due").addEventListener("input",e=>{r.due=e.target.value;});
  $("#rec-status").querySelectorAll(".choice").forEach(ch=>ch.addEventListener("click",()=>{
    r.status=ch.getAttribute("data-s");
    $("#rec-status").querySelectorAll(".choice").forEach(c=>{const on=c.getAttribute("data-s")===r.status;c.classList.toggle("sel",on);c.querySelector(".box").textContent=on?"✓":"";});
  }));
  $("#rec-back").addEventListener("click",()=>renderJournal());
  $("#rec-save").addEventListener("click",()=>{
    if(isNew){if(!(r.text||"").trim()){alert("Введите текст записи.");return;}STATE.journal.records.push(r);}
    save();renderJournal();
  });
  window.scrollTo(0,0);
}
function renderPeople(){
  hideAllScreens();
  $("#appTitle").textContent="Ответственные";
  $("#tabbar").style.display="none";$("#navbar").style.display="none";
  const root=$("#screen-people");root.classList.add("active");
  const people=STATE.journal.people;
  let h=`<div class="sectitle">Ответственные за объект</div><div class="secsub">ФИО, телефон, роль</div>`;
  people.forEach(p=>{
    h+=`<div class="personrow"><div><span class="pn">${escapeHtml(p.name)}</span><span class="rolebadge">${escapeHtml(p.role||"—")}</span><div style="font-size:12px;color:var(--muted)">${escapeHtml(p.phone||"")}</div></div><span class="delx" data-delp="${p.id}">✕</span></div>`;
  });
  h+=`<div class="field"><label class="q">Добавить человека</label>
    <input type="text" id="p-name" placeholder="ФИО" style="margin-bottom:8px">
    <input type="tel" id="p-phone" placeholder="Телефон" style="margin-bottom:8px">
    <input type="text" id="p-role" placeholder="Роль (ГИП, прораб, заказчик, собственник…)">
    <button class="bigbtn" style="margin-top:10px" id="p-add">➕ Добавить</button></div>`;
  h+=`<div class="navrow"><button class="btn-back" id="p-back">‹ Назад в журнал</button></div>`;
  root.innerHTML=h;
  root.querySelectorAll("[data-delp]").forEach(b=>b.addEventListener("click",()=>{
    const pid=b.getAttribute("data-delp");
    STATE.journal.people=people.filter(x=>x.id!==pid);
    STATE.journal.records.forEach(r=>{r.responsibleIds=(r.responsibleIds||[]).filter(x=>x!==pid);});
    save();renderPeople();
  }));
  $("#p-add").addEventListener("click",()=>{
    const name=($("#p-name").value||"").trim();if(!name){alert("Введите ФИО.");return;}
    STATE.journal.people.push({id:uid("p"),name:name,phone:($("#p-phone").value||"").trim(),role:($("#p-role").value||"").trim()});
    save();renderPeople();
  });
  $("#p-back").addEventListener("click",()=>renderJournal());
  window.scrollTo(0,0);
}

/* ===================== ЕДИНЫЙ ОТЧЁТ (печать + письмо) ===================== */
async function buildIssuesPrint(){
  if(!STATE.issues.length)return `<div class="p-sec pagebreak">ЗАМЕЧАНИЯ К ОБЪЕКТУ</div><div class="p-row"><span class="k">нет замечаний</span><span class="v"></span></div>`;
  let h=`<div class="p-sec pagebreak">ЗАМЕЧАНИЯ К ОБЪЕКТУ (${STATE.issues.length})</div>`;
  for(let i=0;i<STATE.issues.length;i++){
    const it=STATE.issues[i];
    h+=`<div class="p-row"><span class="k"><b>${i+1}. ${escapeHtml(it.title||"Замечание")}</b></span><span class="v">${statusLabel(it.status)}</span></div>`;
    if(it.text)h+=`<div style="font-size:11px;margin:2px 0 4px">${escapeHtml(it.text)}</div>`;
    const arr=it.photos||[];
    if(arr.length){let figs="";for(const pid of arr){const du=await photoDataURL(pid);if(du)figs+=`<figure><img src="${du}"><figcaption>замеч. ${i+1}</figcaption></figure>`;}if(figs)h+=`<div class="p-photos">${figs}</div>`;}
  }
  return h;
}
function buildJournalPrint(){
  const j=STATE.journal;
  let h=`<div class="p-sec pagebreak">ЖУРНАЛ ОБЪЕКТА</div>`;
  h+=`<div class="p-row"><span class="k"><b>Ответственные</b></span><span class="v"></span></div>`;
  if(!j.people.length)h+=`<div class="p-row"><span class="k">не назначены</span><span class="v"></span></div>`;
  j.people.forEach(p=>{h+=`<div class="p-row"><span class="k">${escapeHtml(p.name)} <small>(${escapeHtml(p.role||"—")})</small></span><span class="v">${escapeHtml(p.phone||"")}</span></div>`;});
  h+=`<div class="p-row" style="margin-top:6px"><span class="k"><b>Записи</b></span><span class="v"></span></div>`;
  if(!j.records.length)h+=`<div class="p-row"><span class="k">нет записей</span><span class="v"></span></div>`;
  j.records.forEach((r,i)=>{
    const resp=(r.responsibleIds||[]).map(id=>{const p=j.people.find(x=>x.id===id);return p?p.name:"";}).filter(Boolean).join(", ");
    h+=`<div class="p-row"><span class="k">${i+1}. ${escapeHtml(r.text||"")}</span><span class="v">${statusLabel(r.status)}</span></div>`;
    const meta=[resp?("Отв.: "+resp):"",r.due?("Срок: "+r.due):""].filter(Boolean).join(" · ");
    if(meta)h+=`<div style="font-size:10px;color:#444;margin-bottom:2px">${escapeHtml(meta)}</div>`;
    (r.comments||[]).forEach(c=>{h+=`<div style="font-size:10px;margin-left:10px">— ${escapeHtml(c.text)}</div>`;});
  });
  return h;
}
async function buildReport(opts){
  let h=`<div class="p-h1">ПАСПОРТ ОБЪЕКТА</div><div class="p-sub">${escapeHtml(STATE.data.t01||"—")} · ${escapeHtml(STATE.data.d01||"")}</div>`;
  if(opts.act)h+=await buildPrint();
  if(opts.issues)h+=await buildIssuesPrint();
  if(opts.journal)h+=buildJournalPrint();
  return h;
}
async function doPrintReport(opts){
  if(!opts.act&&!opts.issues&&!opts.journal){alert("Выберите хотя бы один раздел отчёта.");return;}
  $("#printRoot").innerHTML=await buildReport(opts);
  window.print();
}
function buildReportText(opts){
  let t="ПАСПОРТ ОБЪЕКТА\n";
  t+="Объект: "+(STATE.data.t01||"—")+"\nДата: "+(STATE.data.d01||"—")+"\n====================================\n";
  if(opts.act)t+="\n[АКТ ОСМОТРА]\n"+buildActText();
  if(opts.issues){
    t+="\n[ЗАМЕЧАНИЯ]\n";if(!STATE.issues.length)t+="  нет\n";
    STATE.issues.forEach((it,i)=>{t+=`${i+1}. ${it.title||"Замечание"} — ${statusLabel(it.status)}\n   ${(it.text||"").replace(/\s+/g,' ')}\n   фото: ${(it.photos||[]).length}\n`;});
  }
  if(opts.journal){
    const j=STATE.journal;t+="\n[ЖУРНАЛ]\nОтветственные:\n";if(!j.people.length)t+="  нет\n";
    j.people.forEach(p=>{t+=`  - ${p.name} (${p.role||"—"}) ${p.phone||""}\n`;});
    t+="Записи:\n";if(!j.records.length)t+="  нет\n";
    j.records.forEach((r,i)=>{const resp=(r.responsibleIds||[]).map(id=>{const p=j.people.find(x=>x.id===id);return p?p.name:"";}).filter(Boolean).join(", ");
      t+=`  ${i+1}. ${r.text||""} [${statusLabel(r.status)}]${resp?(" отв.: "+resp):""}${r.due?(" срок: "+r.due):""}\n`;});
  }
  t+="\n====================================\nФото и подписи — в приложенном PDF (кнопка «Печать → Сохранить как PDF»).\n";
  return t;
}
function doEmailReport(opts){
  if(!opts.act&&!opts.issues&&!opts.journal){alert("Выберите хотя бы один раздел отчёта.");return;}
  const subj=(opts.act?"Паспорт объекта":"Замечания")+" — "+(STATE.data.t01||"");
  const body=buildReportText(opts);
  const url=`mailto:${recipients()}?subject=${encodeURIComponent(subj.trim())}&body=${encodeURIComponent(body)}`;
  window.location.href=url;
}
